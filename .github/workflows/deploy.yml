name: Deploy CRM to Cloudflare

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build and Deploy to Cloudflare
        id: deploy
        run: |
          npm run build:cf
          npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          # Las variables de entorno para la ejecución (runtime) se deben configurar en el panel de Cloudflare.
          # Si necesitas variables en tiempo de compilación (build), agrégalas aquí.
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
