<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#3b82f6">
  <title>Aquatech CRM — Sin Conexión</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0f1e;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Animated background */
    .bg-anim {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(59, 130, 246, 0.12) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(6, 182, 212, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 90%, rgba(59, 130, 246, 0.06) 0%, transparent 40%);
      animation: drift 8s ease-in-out infinite alternate;
    }

    @keyframes drift {
      0% { opacity: 0.8; transform: scale(1); }
      100% { opacity: 1; transform: scale(1.05); }
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 32px 24px;
      max-width: 420px;
      width: 100%;
    }

    /* Logo */
    .logo-ring {
      width: 100px;
      height: 100px;
      margin: 0 auto 24px;
      border-radius: 50%;
      padding: 3px;
      background: linear-gradient(135deg, #3b82f6, #06b6d4, #3b82f6);
      background-size: 200% 200%;
      animation: ring-glow 3s ease-in-out infinite;
    }

    @keyframes ring-glow {
      0%, 100% { background-position: 0% 50%; box-shadow: 0 0 20px rgba(59, 130, 246, 0.3); }
      50% { background-position: 100% 50%; box-shadow: 0 0 40px rgba(59, 130, 246, 0.5); }
    }

    .logo-ring img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #0a0f1e;
    }

    .brand {
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: 2px;
      margin-bottom: 4px;
    }

    .brand span { color: #3b82f6; }

    .tagline {
      font-size: 0.75rem;
      color: #64748b;
      font-style: italic;
      margin-bottom: 32px;
    }

    /* Wifi icon animated */
    .wifi-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 16px;
      position: relative;
    }

    .wifi-icon svg {
      width: 100%; height: 100%;
      stroke: #ef4444;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .wifi-icon .wave {
      animation: wave-fade 2s ease-in-out infinite;
    }
    .wifi-icon .wave:nth-child(1) { animation-delay: 0s; }
    .wifi-icon .wave:nth-child(2) { animation-delay: 0.3s; }
    .wifi-icon .wave:nth-child(3) { animation-delay: 0.6s; }

    @keyframes wave-fade {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: #f1f5f9;
    }

    .desc {
      font-size: 0.9rem;
      color: #94a3b8;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .desc strong {
      color: #3b82f6;
    }

    /* Status bar */
    .status-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 20px;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      border-radius: 12px;
      margin-bottom: 24px;
      font-size: 0.85rem;
      color: #ef4444;
      transition: all 0.5s ease;
    }

    .status-bar.online {
      background: rgba(34, 197, 94, 0.1);
      border-color: rgba(34, 197, 94, 0.3);
      color: #22c55e;
    }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: currentColor;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    /* Buttons */
    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 24px;
      border: none;
      border-radius: 12px;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
    }

    .btn-primary {
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: white;
      box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-ghost {
      background: rgba(255, 255, 255, 0.05);
      color: #94a3b8;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .btn-ghost:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #e2e8f0;
    }

    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .footer {
      margin-top: 40px;
      font-size: 0.7rem;
      color: #475569;
    }

    /* Success state */
    .container.reconnected h1 { color: #22c55e; }
    .container.reconnected .wifi-icon svg { stroke: #22c55e; }
  </style>
</head>
<body>
  <div class="bg-anim"></div>

  <div class="container" id="main">
    <div class="logo-ring">
      <img src="/logo.jpg" alt="Aquatech" onerror="this.style.display='none'">
    </div>
    <div class="brand">A<span>Q</span>UATECH</div>
    <div class="tagline">innovación hidráulica</div>

    <div class="wifi-icon">
      <svg viewBox="0 0 24 24">
        <path class="wave" d="M1 1l22 22"/>
        <path class="wave" d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
        <path class="wave" d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
        <path class="wave" d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
        <path class="wave" d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
        <path class="wave" d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
        <circle cx="12" cy="20" r="1" fill="currentColor"/>
      </svg>
    </div>

    <h1 id="title">Sin Conexión</h1>
    <p class="desc" id="desc">
      No tienes conexión a internet. Tus mensajes y gastos pendientes se 
      <strong>sincronizarán automáticamente</strong> cuando vuelvas a estar en línea.
    </p>

    <div class="status-bar" id="status">
      <div class="status-dot"></div>
      <span id="statusText">Desconectado — esperando red...</span>
    </div>

    <div class="btn-group">
      <button class="btn btn-primary" id="retryBtn" onclick="retryConnection()">
        <span class="spinner" id="spinner"></span>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="retryIcon">
          <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
        </svg>
        <span id="retryText">Reintentar conexión</span>
      </button>
      <button class="btn btn-ghost" onclick="window.location.href='/admin/operador'">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        Reintentar Ir al CRM
      </button>
    </div>

    <p class="footer">© 2026 Aquatech Loja — Todos los derechos reservados</p>
  </div>

  <script>
    // Auto-detect when connection comes back
    window.addEventListener('online', () => {
      const status = document.getElementById('status');
      const statusText = document.getElementById('statusText');
      const title = document.getElementById('title');
      const desc = document.getElementById('desc');
      const main = document.getElementById('main');
      
      status.classList.add('online');
      statusText.textContent = '¡Conectado! Redirigiendo...';
      title.textContent = '¡Conexión restaurada!';
      desc.textContent = 'Redirigiendo al CRM...';
      main.classList.add('reconnected');
      
      setTimeout(() => {
        window.location.reload();
      }, 1500);
    });

    function retryConnection() {
      const spinner = document.getElementById('spinner');
      const retryIcon = document.getElementById('retryIcon');
      const retryText = document.getElementById('retryText');

      spinner.style.display = 'block';
      retryIcon.style.display = 'none';
      retryText.textContent = 'Verificando...';

      fetch('/api/auth/session', { cache: 'no-store' })
        .then(r => {
          if (r.ok) {
            window.location.href = '/admin/operador';
          } else {
            throw new Error('No hay red');
          }
        })
        .catch(() => {
          spinner.style.display = 'none';
          retryIcon.style.display = 'block';
          retryText.textContent = 'Sin conexión — reintentar';
          
          setTimeout(() => {
            retryText.textContent = 'Reintentar conexión';
          }, 2000);
        });
    }
  </script>
</body>
</html>
